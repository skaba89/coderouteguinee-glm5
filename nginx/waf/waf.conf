# ============================================================
# CodeRoute Guinée — ModSecurity WAF Configuration (Sprint 13)
# ============================================================
# This file configures ModSecurity v3 with the OWASP Core Rule Set
# (CRS) v3.3 for the CodeRoute Guinée application.
#
# Deployment: in front of the Next.js app, alongside Nginx.
# Either as a sidecar container (modsecurity-nginx) or as an
# Appliance VM in the Conakry DC.
#
# OWASP CRS rules are loaded from /etc/nginx/modsec/crs/.
# Local tuning rules are loaded from /etc/nginx/modsec/custom-rules.conf.
# ============================================================

# ─── Enable ModSecurity ────────────────────────────────────
modsecurity on;

# ─── Use DetectionOnly mode for the first 7 days of pilot ──
# Switch to "on" (blocking) after tuning is complete.
# See docs/ops/OPS-RUNBOOK.md §WAF Tuning for the procedure.
modsecurity_rules_file /etc/nginx/modsec/modsecurity.conf;

# ─── Per-location rule overrides ───────────────────────────
# Disable WAF inspection on the health endpoint (used by
# load balancers every 5s — would pollute logs and risk false
# positives triggering blocks).
location /api/health {
  modsecurity off;
  proxy_pass http://app_upstream;
}

# Webhook endpoints receive payment provider callbacks (Orange
# Money, MTN MoMo). These contain base64-encoded payloads that
# can trigger CRS false positives. We still inspect but add
# rule exclusions for known-safe patterns (see custom-rules.conf).
location ~ ^/api/payments/webhook/(orange|mtn)$ {
  modsecurity on;
  modsecurity_rules_file /etc/nginx/modsec/webhook-exclusions.conf;
  proxy_pass http://app_upstream;
}

# API routes for file uploads (audio narration mp3s, profile
# pictures) — increase request body limit and disable request
# body inspection for the multipart/form-data parts we trust.
location ~ ^/api/(uploads|media)/ {
  client_max_body_size 25M;
  modsecurity on;
  modsecurity_rules_file /etc/nginx/modsec/upload-exclusions.conf;
  proxy_pass http://app_upstream;
}

# ─── Default: all other locations get full WAF protection ──
location / {
  modsecurity on;
  proxy_pass http://app_upstream;
}
