# ============================================================
# CodeRoute Guinée — nginx site config
# ============================================================
# Replace "coderoute-gn.org" with your real domain.
# TLS certs must be at /etc/nginx/certs/fullchain.pem and privkey.pem
# (use certbot/Let's Encrypt or mount your own).
# ============================================================

# ─── HTTP → HTTPS redirect ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name coderoute-gn.org www.coderoute-gn.org;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS main site ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name coderoute-gn.org www.coderoute-gn.org;

    # ─── TLS certificates (mount via docker volume) ────────
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ─── TLS hardening (Mozilla Intermediate, June 2024) ───
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Security headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP is set by Next.js middleware — don't override here.

    # ─── Static file caching ───────────────────────────────
    location /_next/static/ {
        proxy_pass http://coderoute_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /static/ {
        proxy_pass http://coderoute_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Service worker must NOT be cached aggressively
    location = /sw.js {
        proxy_pass http://coderoute_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        access_log off;
    }

    # Manifest
    location = /manifest.json {
        proxy_pass http://coderoute_app;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # ─── Auth endpoints — stricter rate limit ──────────────
    location ~ ^/api/auth/(login|register|reset-password) {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://coderoute_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ─── Cron endpoints — internal only (block external) ──
    location ~ ^/api/cron/ {
        # Only allow localhost (the host's cron daemon)
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://coderoute_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API endpoints ─────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://coderoute_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── Everything else ────────────────────────────────────
    location / {
        proxy_pass http://coderoute_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
