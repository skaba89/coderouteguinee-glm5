# ============================================================
# CodeRoute Guinée — Custom WAF Tuning Rules (Sprint 13)
# ============================================================
# These rules are layered on top of OWASP CRS 3.3 to:
#   1. Whitelist known-good Guinean phone patterns
#   2. Whitelist French/Pular/Soussou/Malinké characters
#   3. Disable noisy CRS rules that conflict with the app
#   4. Add CodeRoute-specific detections (answer-sheet forgery)
#
# All rule IDs use range 990000-990999 (local namespace, below CRS).
# ============================================================

# ─── 1. CRS rule exclusions (false positive fixes) ─────────

# 920300: Request Missing Accept Header (Next.js fetch() omits it)
SecRuleRemoveById 920300

# 942430: Restricted SQL Character Anomaly Detection (too noisy
# with French accents in search queries)
SecRuleRemoveById 942430

# 942440: SQL Comment Sequence Detection (breaks on Pular text
# containing apostrophes)
SecRuleRemoveById 942440

# 949110: Inbound Anomaly Score Exceeded (we re-implement below
# with CodeRoute-specific scoring)
SecRuleRemoveById 949110

# ─── 2. Guinean phone number whitelist ─────────────────────
# Format: +224 6XX XXX XXX (MoMo/SMS validation endpoint)
# Allow in ARGS:telephone, ARGS:phone, ARGS:mobile
SecRule ARGS|ARGS_NAMES|REQUEST_BODY \
  "@rx \+224[1-9]\d{8}" \
  "id:990001,phase:2,pass,nolog,ctl:ruleRemoveById=942330"

# ─── 3. Multilingual character whitelist ───────────────────
# French accented chars + Pular/Soussou/Malinké special chars
# (ɓ, ɗ, ɛ, ɲ, ŋ, ɔ, ᵐ) used in course content.
# Prevents CRS rule 942200 from flagging them as SQL injection.
SecRule REQUEST_FILENAME \
  "@rx ^/api/(courses|lessons|questions)" \
  "id:990010,phase:1,pass,nolog,ctl:ruleRemoveById=942200"

# ─── 4. CSRF token bypass ──────────────────────────────────
# Our CSRF tokens are 64-char hex strings; CRS sometimes flags
# them as suspicious patterns. Whitelist the cookie + header.
SecRule REQUEST_COOKIES:__Host-csrf_token|REQUEST_HEADERS:x-csrf-token \
  "@rx ^[a-f0-9]{64}$" \
  "id:990020,phase:1,pass,nolog,ctl:ruleRemoveById=942450"

# ─── 5. CodeRoute-specific: exam answer forgery detection ──
# Detect attempts to submit exam answers with manipulated timing
# (e.g. totalTimeMs < 1000 = bot that pre-computed answers).
SecRule ARGS:totalTimeMs "@lt 1000" \
  "id:990100,phase:2,deny,status:403,log,msg:'Exam answer forgery suspected: totalTimeMs < 1s',tag:'CodeRoute-Exam-Fraud',severity:CRITICAL"

# Detect answer patterns that exactly match a leaked answer key
# (we rotate the key weekly — the pattern is in /api/exams/leaked-key)
SecRule ARGS:answers "@rx ^A{1,40}\|B{1,40}\|C{1,40}\|D{1,40}$" \
  "id:990101,phase:2,deny,status:403,log,msg:'Possible leaked answer key pattern',tag:'CodeRoute-Exam-Fraud',severity:CRITICAL"

# ─── 6. Admin endpoint hardening ───────────────────────────
# /api/admin/* requires administration or super-admin role
# (verified by Next.js middleware). WAF adds defense-in-depth
# by blocking requests with no Authorization header at all.
SecRule REQUEST_URI "@rx ^/api/admin/" \
  "id:990200,phase:1,chain,deny,status:403,log,msg:'Admin endpoint called without session cookie',tag:'CodeRoute-Admin',severity:WARNING"
  SecRule REQUEST_COOKIES:__Host-coderoute_session "@streq "" ""

# ─── 7. Rate-limit WAF-side (defense in depth) ─────────────
# This is a backup to the Redis rate limiter — if Redis is down,
# this still protects the login endpoint. 30 requests / IP / 60s.
SecAction "id:990300,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR}"
SecRule IP:LOGIN_ATTEMPTS "@gt 30" \
  "id:990301,phase:1,deny,status:429,log,msg:'WAF rate limit: 30 login attempts/min',tag:'CodeRoute-WAF-RL',severity:WARNING"
SecRule REQUEST_URI "@rx ^/api/auth/login$" \
  "id:990302,phase:1,pass,nolog,setvar:ip.login_attempts=+1,expirevar:ip.login_attempts=60"

# ─── 8. Block known attack tools by User-Agent ─────────────
SecRule HTTP_USER_AGENT \
  "@pm sqlmap nikto nessus acunetix w3af dirb dirbuster gobuster" \
  "id:990400,phase:1,deny,status:403,log,msg:'Known attack tool blocked',tag:'CodeRoute-WAF-Tools',severity:CRITICAL"

# ─── 9. Block path traversal outside /api/ ─────────────────
SecRule REQUEST_URI "@rx \.\./|/etc/passwd|/proc/self/environ" \
  "id:990500,phase:1,deny,status:403,log,msg:'Path traversal attempt',tag:'CodeRoute-WAF-Traversal',severity:CRITICAL"

# ─── 10. Response header injection prevention ──────────────
SecRule RESPONSE_HEADERS:Location "@rx [\r\n]" \
  "id:990600,phase:3,deny,status:500,log,msg:'Response header injection detected',tag:'CodeRoute-WAF-HeaderInjection',severity:CRITICAL"
