# ============================================================
# CodeRoute Guinée — WAF Exclusions for Payment Webhooks
# ============================================================
# Orange Money and MTN MoMo send webhook callbacks with:
#   - HMAC-SHA256 signatures in headers
#   - base64-encoded JSON payloads
#   - Status codes, transaction IDs, amounts
#
# These can trigger CRS false positives. We disable specific
# rules ONLY for the webhook endpoints, never globally.
# ============================================================

# Only apply these exclusions on the webhook paths
SecRule REQUEST_URI "@rx ^/api/payments/webhook/(orange|mtn)$" \
  "id:991001,phase:1,pass,nolog,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=942200,ctl:ruleRemoveById=942330,ctl:ruleRemoveById=942430,ctl:ruleRemoveById=942440"

# HMAC signature header looks like base64 — whitelist it
SecRule REQUEST_HEADERS:X-Orange-Signature|REQUEST_HEADERS:X-MTN-Signature \
  "@rx ^[a-f0-9]{64}$" \
  "id:991002,phase:1,pass,nolog,ctl:ruleRemoveById=942450"

# Webhook payload contains transaction IDs that look like SQL keywords
# (e.g. "OR-123456" — "OR" is a SQL operator)
SecRule REQUEST_URI "@rx ^/api/payments/webhook/" \
  "id:991003,phase:2,pass,nolog,ctl:ruleRemoveById=942410"
