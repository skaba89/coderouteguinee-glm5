# ============================================================
# CodeRoute Guinée — ModSecurity main config (Sprint 13)
# ============================================================
# Loaded by Nginx via `modsecurity_rules_file`.
# Tune DetectionOnly → On after the 7-day observation window.
# ============================================================

# ─── Engine mode ───────────────────────────────────────────
# DetectionOnly = log only, don't block (use during pilot)
# On            = block requests matching rules (production)
SecRuleEngine DetectionOnly

# ─── Request body inspection ───────────────────────────────
SecRequestBodyAccess On
SecRequestBodyLimit 26214400         # 25 MiB (allows audio uploads)
SecRequestBodyNoFilesLimit 1048576   # 1 MiB of non-file body
SecRequestBodyInMemoryLimit 262144   # 256 KiB
SecRequestBodyLimitAction Reject

# ─── Response body inspection ──────────────────────────────
SecResponseBodyAccess On
SecResponseBodyLimit 1048576         # 1 MiB
SecResponseBodyLimitAction ProcessPartial
SecResponseBodyMimeTypeClearance On
SecResponseBodyMimeType text/html text/plain text/xml application/json

# ─── Logging ───────────────────────────────────────────────
SecAuditEngine RelevantOnly
SecAuditLog /var/log/nginx/modsec_audit.log
SecAuditLogFormat JSON
SecAuditLogParts ABIJDEFHZ
SecAuditLogStorageDir /var/log/nginx/modsec
SecAuditLogType Serial

# ─── Debug log (set to 0 in production) ────────────────────
SecDebugLog /var/log/nginx/modsec_debug.log
SecDebugLogLevel 0

# ─── Default phase 1 actions ───────────────────────────────
SecDefaultAction "phase:1,pass,log,tag:'CodeRoute-Guinee'"

# ─── Data persistence (in-memory collection) ───────────────
SecDataDir /var/cache/modsecurity

# ─── Include OWASP CRS 3.3 ─────────────────────────────────
Include /etc/nginx/modsec/crs/crs-setup.conf
Include /etc/nginx/modsec/crs/rules/*.conf

# ─── Include local tuning ──────────────────────────────────
Include /etc/nginx/modsec/custom-rules.conf
Include /etc/nginx/modsec/webhook-exclusions.conf
Include /etc/nginx/modsec/upload-exclusions.conf
