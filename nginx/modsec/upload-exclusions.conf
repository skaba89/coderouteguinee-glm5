# ============================================================
# CodeRoute Guinée — WAF Exclusions for Upload Endpoints
# ============================================================
# /api/uploads and /api/media accept multipart/form-data with
# audio narration mp3 files (≤ 25 MiB) and profile images.
# We disable body inspection for known-safe file extensions
# but keep all other protections.
# ============================================================

# Disable body inspection for multipart parts with safe extensions
SecRule REQUEST_URI "@rx ^/api/(uploads|media)/" \
  "id:992001,phase:1,pass,nolog,ctl:requestBodyProcessor=URLENCODED"

# Re-enable URLENCODED processor only for non-file fields
# (alternative: use MULTIPART_PART_HEADERS inspection selectively)

# Allow large request body
SecRule REQUEST_URI "@rx ^/api/(uploads|media)/" \
  "id:992002,phase:1,pass,nolog,ctl:ruleRemoveById=920340"

# Disable SQL injection checks on multipart filename (mp3 names
# can contain apostrophes from Pular/Soussou song titles)
SecRule REQUEST_URI "@rx ^/api/(uploads|media)/" \
  "id:992003,phase:2,pass,nolog,ctl:ruleRemoveById=942200"
