# ============================================================
# CodeRoute Guinée — Grafana dashboard provisioning
# ============================================================
# Auto-loads all JSON dashboards from /var/lib/grafana/dashboards/
# ============================================================

apiVersion: 1

providers:
  - name: 'CodeRoute Guinée dashboards'
    orgId: 1
    folder: 'CodeRoute Guinée'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
