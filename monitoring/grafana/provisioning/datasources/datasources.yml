# ============================================================
# CodeRoute Guinée — Grafana datasource provisioning
# ============================================================
# Auto-provisions Prometheus and Loki as datasources on startup.
# No manual configuration needed in Grafana UI.
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'
      httpMethod: 'POST'

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: db:5432
    user: $${POSTGRES_USER}
    database: $${POSTGRES_DB}
    editable: false
    secureJsonData:
      password: $${POSTGRES_PASSWORD}
    jsonData:
      sslmode: 'disable'
      postgresVersion: 1600
      timescaledb: false
