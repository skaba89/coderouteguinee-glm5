# ============================================================
# CodeRoute Guinée — Prometheus alert rules (Sprint 12)
# ============================================================
# All alerts are grouped by severity:
#   - critical: page on-call immediately (Slack + SMS)
#   - warning:  notify Slack, investigate within 4h
#   - info:     log only, weekly review
#
# Each alert includes:
#   - runbook_url: link to detailed remediation steps
#   - severity:    for routing in Alertmanager
#   - summary:     short description
#   - description: detailed explanation
# ============================================================

groups:
  # ─── Application availability ──────────────────────────
  - name: app-availability
    interval: 30s
    rules:
      - alert: AppDown
        expr: up{job="coderoute-app"} == 0
        for: 2m
        labels:
          severity: critical
          component: app
        annotations:
          summary: "CodeRoute app is down"
          description: "The Next.js application has been unreachable for 2 minutes."
          runbook_url: "https://github.com/skaba89/coderouteguinee-glm5/blob/main/docs/ops/OPS-RUNBOOK.md#app-down"

      - alert: AppHighErrorRate
        expr: |
          sum(rate(http_requests_total{job="coderoute-app",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="coderoute-app"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          component: app
        annotations:
          summary: "App error rate > 5%"
          description: "More than 5% of HTTP requests are returning 5xx errors for the last 5 minutes."
          runbook_url: "https://github.com/skaba89/coderouteguinee-glm5/blob/main/docs/ops/OPS-RUNBOOK.md#high-error-rate"

      - alert: AppHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="coderoute-app"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
          component: app
        annotations:
          summary: "App p95 latency > 2s"
          description: "95th percentile latency is above 2 seconds for the last 5 minutes."

  # ─── Database ──────────────────────────────────────────
  - name: database
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter cannot connect to the database."
          runbook_url: "https://github.com/skaba89/coderouteguinee-glm5/blob/main/docs/ops/OPS-RUNBOOK.md#postgres-down"

      - alert: PostgresHighConnections
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL connections > 80%"
          description: "PostgreSQL is using more than 80% of max_connections for 5 minutes."

      - alert: PostgresConnectionPoolExhausted
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.95
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL connection pool exhausted"
          description: "PostgreSQL is at 95%+ of max_connections — pool exhaustion imminent."

      - alert: PostgresSlowQueries
        expr: |
          rate(pg_stat_user_tables_seq_scan[5m]) > 1
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL slow sequential scans detected"
          description: "High rate of sequential scans suggests missing indexes or inefficient queries."

      - alert: PostgresReplicationLag
        expr: |
          pg_stat_replication_lag_seconds > 300
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL replication lag > 5 min"
          description: "Replication lag to Kankan DR is above 5 minutes (RPO target)."

      - alert: PostgresDiskSpaceLow
        expr: |
          (pg_database_size_bytes{datname="coderoute"} / node_filesystem_size_bytes{mountpoint="/var/lib/postgresql/data"}) > 0.85
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL disk space > 85%"
          description: "PostgreSQL data directory is using more than 85% of disk space."

  # ─── Redis ─────────────────────────────────────────────
  - name: redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis is down"
          description: "Redis exporter cannot connect to Redis."
          runbook_url: "https://github.com/skaba89/coderouteguinee-glm5/blob/main/docs/ops/OPS-RUNBOOK.md#redis-down"

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis memory > 90%"
          description: "Redis is using more than 90% of maxmemory — evictions may start."

      - alert: RedisEvictions
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis evicting keys"
          description: "Redis is evicting > 100 keys/s — cache is undersized or traffic is spiking."

  # ─── Host (CPU, RAM, disk) ─────────────────────────────
  - name: host
    interval: 30s
    rules:
      - alert: HostHighCpuLoad
        expr: |
          (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 80
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Host CPU > 80%"
          description: "Host CPU load is above 80% for 10 minutes."

      - alert: HostHighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Host memory > 85%"
          description: "Host memory usage is above 85% — OOM risk."

      - alert: HostDiskSpaceLow
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint!~"/proc|/sys|/dev"} / node_filesystem_size_bytes{mountpoint!~"/proc|/sys|/dev"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "Disk space > 85% on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is above 85% full."

      - alert: HostDiskSpaceCritical
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint!~"/proc|/sys|/dev"} / node_filesystem_size_bytes{mountpoint!~"/proc|/sys|/dev"})) * 100 > 95
        for: 5m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Disk space CRITICAL > 95% on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is above 95% full — immediate action required."

  # ─── Business metrics (CodeRoute-specific) ─────────────
  - name: business
    interval: 30s
    rules:
      - alert: PaymentFailureRateHigh
        expr: |
          sum(rate(payment_webhook_total{status="failed"}[10m]))
          /
          sum(rate(payment_webhook_total[10m]))
          > 0.1
        for: 15m
        labels:
          severity: critical
          component: business
        annotations:
          summary: "Payment failure rate > 10%"
          description: "More than 10% of payment webhooks are failing for the last 15 minutes. May indicate Orange Money/MTN outage or webhook secret issue."
          runbook_url: "https://github.com/skaba89/coderouteguinee-glm5/blob/main/docs/ops/OPS-RUNBOOK.md#payment-failures"

      - alert: ExamSubmissionFailureRate
        expr: |
          sum(rate(exam_submission_total{status="failed"}[10m]))
          /
          sum(rate(exam_submission_total[10m]))
          > 0.05
        for: 10m
        labels:
          severity: critical
          component: business
        annotations:
          summary: "Exam submission failure rate > 5%"
          description: "More than 5% of exam submissions are failing — candidates may be impacted during exam window."

      - alert: FraudAlertsSpike
        expr: |
          sum(rate(fraud_alert_total[1h])) > 5
        for: 30m
        labels:
          severity: warning
          component: business
        annotations:
          summary: "Fraud alert spike"
          description: "More than 5 fraud alerts per hour — possible attack pattern."

      - alert: NoBackupsFor24h
        expr: |
          time() - backup_last_success_timestamp_seconds > 86400
        for: 1h
        labels:
          severity: critical
          component: business
        annotations:
          summary: "No successful backup in 24h"
          description: "The last successful database backup is older than 24 hours. Data loss risk."
          runbook_url: "https://github.com/skaba89/coderouteguinee-glm5/blob/main/docs/ops/OPS-RUNBOOK.md#backup-missing"

  # ─── SSL/TLS ───────────────────────────────────────────
  - name: tls
    interval: 1h
    rules:
      - alert: SSLCertExpiringSoon
        expr: |
          probe_ssl_earliest_cert_expiry - time() < 1209600
        for: 1h
        labels:
          severity: warning
          component: tls
        annotations:
          summary: "SSL certificate expiring in < 14 days"
          description: "SSL certificate for {{ $labels.instance }} expires in less than 14 days."

      - alert: SSLCertExpired
        expr: |
          probe_ssl_earliest_cert_expiry - time() < 0
        for: 5m
        labels:
          severity: critical
          component: tls
        annotations:
          summary: "SSL certificate EXPIRED"
          description: "SSL certificate for {{ $labels.instance }} has expired."
