# ============================================================
# CodeRoute Guinée — Alertmanager configuration (Sprint 12)
# ============================================================
# Routes alerts to the right channel based on severity:
#   - critical → Slack #alerts-critical + SMS (via email-to-SMS gateway)
#   - warning  → Slack #alerts-warning
#   - info     → Slack #alerts-info (no notification)
#
# Slack webhook URL is injected via environment variable.
# ============================================================

global:
  resolve_timeout: 5m
  # Slack API URL — set via env var SLACK_API_URL
  slack_api_url: '${SLACK_API_URL}'

# ─── Templates ────────────────────────────────────────────
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ─── Inhibition rules (suppress lower severity if higher is firing) ──
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['component']

  - source_match:
      severity: 'critical'
    target_match:
      severity: 'info'
    equal: ['component']

# ─── Routing ──────────────────────────────────────────────
route:
  receiver: 'default'
  group_by: ['alertname', 'component', 'severity']
  group_wait: 30s        # Wait 30s before sending first notification (group batching)
  group_interval: 5m     # Send updates every 5 min if alert continues
  repeat_interval: 4h    # Re-notify every 4h if alert still active

  routes:
    # ─── Critical alerts → Slack + PagerDuty-style email ──
    - match:
        severity: 'critical'
      receiver: 'critical-slack'
      group_wait: 10s
      repeat_interval: 1h
      routes:
        # Database or backup critical → also SMS
        - match:
            component: 'database'
          receiver: 'critical-sms'
        - match:
            component: 'business'
          receiver: 'critical-sms'

    # ─── Warning alerts → Slack only ──────────────────────
    - match:
        severity: 'warning'
      receiver: 'warning-slack'
      group_wait: 1m
      repeat_interval: 4h

    # ─── Info alerts → Slack (no notification) ────────────
    - match:
        severity: 'info'
      receiver: 'info-slack'
      group_wait: 5m
      repeat_interval: 24h

# ─── Receivers ────────────────────────────────────────────
receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'

  - name: 'critical-slack'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: ':rotating_light: [CRITICAL] {{ .CommonLabels.alertname }}'
        text: |
          *Alert:* {{ .CommonLabels.alertname }}
          *Component:* {{ .CommonLabels.component }}
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Runbook:* {{ .CommonAnnotations.runbook_url }}
          *Starts at:* {{ .ActiveAt.Format "2006-01-02 15:04:05 MST" }}

  - name: 'critical-sms'
    # Email-to-SMS gateway (configurable per operator)
    # Orange Guinée SMS gateway: <phonenumber>@sms.orange-gn.com
    # MTN Guinée SMS gateway: <phonenumber>@sms.mtn-gn.com
    email_configs:
      - to: '${ONCALL_SMS_EMAIL}'
        from: 'alerts@coderoute-gn.org'
        smarthost: '${SMTP_HOST}:${SMTP_PORT}'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        headers:
          Subject: 'CRITICAL: {{ .CommonLabels.alertname }} — CodeRoute'
        text: |
          ALERT: {{ .CommonLabels.alertname }}
          Component: {{ .CommonLabels.component }}
          Summary: {{ .CommonAnnotations.summary }}
          Time: {{ .ActiveAt.Format "2006-01-02 15:04 MST" }}
    # Also send to Slack
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: ':rotating_light: [CRITICAL+SMS] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }} — SMS sent to on-call'

  - name: 'warning-slack'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: ':warning: [WARNING] {{ .CommonLabels.alertname }}'
        text: |
          *Alert:* {{ .CommonLabels.alertname }}
          *Component:* {{ .CommonLabels.component }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}

  - name: 'info-slack'
    slack_configs:
      - channel: '#alerts-info'
        send_resolved: false
        title: '[INFO] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'
