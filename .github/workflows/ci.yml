# ============================================================
# CodeRoute Guinée — CI Pipeline (Sprint 11)
# ============================================================
# Runs on every push to main and every PR:
#   1. Lint (ESLint)
#   2. Type check (tsc --noEmit)
#   3. Unit tests (Jest)
#   4. Security audit (npm audit + custom security-audit.mjs)
#   5. Build (Next.js standalone)
#   6. Docker image build (no push on PR)
#
# On push to main, additionally:
#   7. Push Docker image to internal registry
#   8. Run k6 smoke load tests against staging
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ─── Lint, type-check, test ─────────────────────────────────
  quality:
    name: Lint + Type-check + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci --maxWorkers=2 --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── Security scans ─────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Custom security audit (48 checks)
        run: node scripts/security-audit.mjs --ci --output=security-audit.json

      - name: Upload security audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: security-audit.json
          retention-days: 30

      - name: CodeQL Scan
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

  # ─── Build Docker image ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, security]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          SESSION_SECRET: ci-session-secret-32-chars-minimum-padding
          JWT_SECRET: ci-jwt-secret-32-chars-minimum-padding
          CSRF_SECRET: ci-csrf-secret-32-chars-minimum-padding
          CRON_SECRET: ci-cron-secret-32-chars-minimum-padding

      - name: Build Docker image
        run: docker build -t coderoute-guinee:${{ github.sha }} .

      - name: Save Docker image
        run: docker save coderoute-guinee:${{ github.sha }} | gzip > coderoute-image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: coderoute-image.tar.gz
          retention-days: 7

  # ─── Smoke load tests against staging (main only) ──────────
  load-test:
    name: k6 Smoke Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: k6 smoke test — health
        run: k6 run --vus 20 --duration 30s load-tests/health.js
        env:
          BASE_URL: https://staging.coderoute-gn.org

      - name: k6 smoke test — login
        run: k6 run --vus 5 --duration 15s load-tests/login.js
        env:
          BASE_URL: https://staging.coderoute-gn.org
          TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}

      - name: k6 smoke test — booking flow
        run: k6 run load-tests/booking-flow.js
        env:
          BASE_URL: https://staging.coderoute-gn.org
          TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}
