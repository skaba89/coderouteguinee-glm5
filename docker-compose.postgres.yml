# ============================================================
# CodeRoute Guinée — Docker Compose for local PostgreSQL
# Usage: docker compose -f docker-compose.postgres.yml up -d
# Then: bash scripts/switch-db.sh postgres
#       DATABASE_URL=postgresql://coderoute:coderoute@localhost:5432/coderoute
#       npx prisma migrate dev --name init
#       npx prisma db seed
# ============================================================

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: coderoute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coderoute
      POSTGRES_PASSWORD: coderoute
      POSTGRES_DB: coderoute
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - coderoute_pg_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coderoute -d coderoute"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: Adminer for DB inspection at http://localhost:8080
  adminer:
    image: adminer:4-standalone
    container_name: coderoute-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  coderoute_pg_data:
    driver: local
